name: Deploy to GitHub Pages

# Publica a demo estática (HTML/CSS/JS na raiz do repo) no GitHub Pages.
# Roda a cada push na main e também pode ser disparado manualmente.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões mínimas para o deploy do Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que só um deploy roda por vez (sem cancelar o que está em produção)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (site na raiz)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
